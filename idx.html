<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookMyShow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="fnav">
    <div class="left">
      <img src="logo.svg">
      <input 
        type="text" 
        id="searchInput"
        placeholder="Search for movies,event,plays"
        onkeydown="if(event.key==='Enter') searchShows()"
      >
    </div>
    <div class="right">
      <p>Location</p>
      <button onclick="window.location.href='/signin'">Sign In</button>
      <i class="fa-solid fa-bars"></i>
    </div>
  </nav>

  <nav class="sec-nav">
    <div class="s-left">
      <p>Movies</p><p>Stream</p><p>Event</p>
      <p>Plays</p><p>Sports</p><p>Activities</p>
    </div>
    <div class="s-right">
      <p>ListYourShow</p><p>Corporates</p>
      <p>Offer</p><p>Gift Cards</p>
    </div>
  </nav>

  <div class="main">
    <img src="https://assets-in-gm.bmscdn.com/promotions/cms/creatives/1772443283367_themessiexperienceindiawebshowcase1240x300mumbai.jpg">
  </div>

  <!-- SEARCH RESULTS -->
  <div id="searchResults" style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px; padding:20px;"></div>

  <!-- Section 1 -->
  <div class="container">
    <h2>Recommended Movies</h2>
    <div class="card" id="movieCard"><p>Loading...</p></div>
  </div>

  <!-- Section 2 -->
  <div class="container">
    <h2>Best Of Live Events</h2>
    <div class="card" id="eventCard"><p>Loading...</p></div>
  </div>

  <!-- Section 3 -->
  <div class="container">
    <h2>PREMIERE</h2>
    <div class="card" id="premiereCard"><p>Loading...</p></div>
  </div>

  <div class="footer">
    <img src="logo.svg">
    <div class="icon">
      <i class="fa-brands fa-facebook"></i>
      <i class="fa-brands fa-square-instagram"></i>
      <i class="fa-brands fa-twitter"></i>
      <i class="fa-brands fa-youtube"></i>
    </div>
  </div>

  <script  src="js/search.js"> </script>

  <script  src="js/fetch.js"> </script>
</body>
</html>
