<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mulish', sans-serif; }
    body { background-color: rgb(245,245,250); }
    .fnav { display:flex; justify-content:center; align-items:center; padding:12px 20px; background-color:rgb(42,42,68); color:white; }
    .fnav .logo { font-size:22px; font-weight:700; color:rgb(244,69,98); }
    .signin-wrapper { display:flex; justify-content:center; align-items:center; min-height:calc(100vh - 56px); }
    .signin-card { background:white; padding:40px 36px; border-radius:10px; box-shadow:0 4px 24px rgba(0,0,0,0.10); width:100%; max-width:400px; }
    .signin-card h2 { text-align:center; margin-bottom:6px; font-size:22px; color:rgb(26,26,48); }
    .signin-card p.sub { text-align:center; color:#888; font-size:13px; margin-bottom:28px; }
    .error-msg { background:#ffe0e5; color:rgb(244,69,98); padding:9px 14px; border-radius:5px; font-size:13px; margin-bottom:18px; text-align:center; }
    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:13px; font-weight:600; color:rgb(26,26,48); margin-bottom:6px; }
    .form-group input { width:100%; padding:10px 14px; border:1.5px solid #ddd; border-radius:5px; font-size:14px; outline:none; }
    .form-group input:focus { border-color:rgb(244,69,98); }
    .signin-btn { width:100%; padding:11px; background-color:rgb(244,69,98); color:white; border:none; border-radius:5px; font-size:15px; font-weight:700; cursor:pointer; margin-top:6px; }
    .signin-btn:hover { background-color:rgb(210,45,75); }
    .divider { text-align:center; color:#aaa; margin:18px 0; font-size:13px; }
    .social-btns { display:flex; gap:10px; }
    .social-btn { flex:1; padding:9px; border:1.5px solid #ddd; border-radius:5px; background:white; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }
    .social-btn:hover { border-color:rgb(244,69,98); }
    .register-link { text-align:center; margin-top:22px; font-size:13px; color:#555; }
    .register-link a { color:rgb(244,69,98); text-decoration:none; font-weight:600; }
    .back-link { text-align:center; margin-top:14px; font-size:13px; }
    .back-link a { color:#888; text-decoration:none; }
    .back-link a:hover { color:rgb(244,69,98); }
  </style>
</head>
<body>
  <nav class="fnav">
    <div class="logo">BookMyShow</div>
  </nav>
  <div class="signin-wrapper">
    <div class="signin-card">
      <h2>Sign In</h2>
      <p class="sub">Get access to your Orders, Wishlist and Recommendations</p>
      <div class="error-msg" id="errMsg" style="display:none">Please enter both email and password.</div>
      <!-- add onsubmit validation -->
<form action="/signin" method="POST" onsubmit="return validateForm()">
        <div class="form-group">
          <label>Email / Mobile No.</label>
          <input type="text" name="email" placeholder="Enter your email or mobile">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password">
        </div>
        <button type="submit" class="signin-btn">Sign In</button>
      </form>
      <div class="divider">— or continue with —</div>
      <div class="social-btns">
        <button class="social-btn"><i class="fa-brands fa-google"></i> Google</button>
        <button class="social-btn"><i class="fa-brands fa-facebook"></i> Facebook</button>
      </div>
      <p class="register-link">New to BookMyShow? <a href="#">Register</a></p>
      <p class="back-link"><a href="/">← Back to Home</a></p>
    </div>
  </div>
  <script>
    if(new URLSearchParams(window.location.search).get('error')==='1')
      document.getElementById('errMsg').style.display='block';
  </script>
  <script src="js/signin.js"></script>
</body>
</html>
